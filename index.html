<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Login System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

    <h2>Регистрация</h2>

    <input id="username" placeholder="Никнейм">
    <input id="password" type="password" placeholder="Пароль (8 цифр)">
    <button onclick="register()">Регистрация</button>

    <hr>

    <h2>Вход</h2>

    <input id="loginUser" placeholder="Никнейм">
    <input id="loginPass" type="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>

    <p id="msg"></p>

</div>

<script src="app.js"></script>

</body>
</html>
