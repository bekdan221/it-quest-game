<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Engine Performance Lab</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 350px; border-right: 1px solid #333; padding: 20px; }
        .main-view { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .graph-container { width: 100%; height: 300px; background: #111; border: 1px solid #222; position: relative; }
        .data-point { background: #00ff41; height: 100%; width: 2px; position: absolute; bottom: 0; transition: 0.5s; }
        .control-group { margin-bottom: 20px; }
        input[type="range"] { width: 100%; accent-color: #00ff41; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ENGINE DIAGNOSTICS</h2>
        <div class="control-group">
            <label>Объем двигателя (литры)</label>
            <input type="range" id="displacement" min="1" max="8" step="0.1" oninput="Lab.calculate()">
        </div>
        <div class="control-group">
            <label>Наддув (PSI)</label>
            <input type="range" id="boost" min="0" max="30" step="1" oninput="Lab.calculate()">
        </div>
    </div>
    <div class="main-view">
        <h1>OUTPUT PERFORMANCE</h1>
        <div class="graph-container" id="graph"></div>
        <h2 id="result">0 HP</h2>
    </div>

    <script>
        const Lab = {
            calculate() {
                const disp = document.getElementById('displacement').value;
                const boost = document.getElementById('boost').value;
                // Формула расчета мощности: (Объем * PSI * коэффициент)
                const hp = Math.floor(disp * (boost * 5 + 50));
                
                document.getElementById('result').innerText = hp + " HP";
                const graph = document.getElementById('graph');
                graph.innerHTML = `<div class="data-point" style="left: ${boost * 3}%;"></div>`;
            }
        };
    </script>
</body>
</html>
