<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Quest Arena Neo</title>
    <style>
        :root {
            --bg-color: #050508;
            --card-bg: #0d0e15;
            --primary: #ff2a5f;
            --primary-glow: rgba(255, 42, 95, 0.4);
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.3);
            --text: #ffffff;
            --text-muted: #8a8d9b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 42, 95, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.05) 0%, transparent 40%);
            position: relative;
        }

        .teacher-credit {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(13, 14, 21, 0.8);
            border: 1px solid var(--accent);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            max-width: 250px;
            line-height: 1.4;
            color: #fff;
            box-shadow: 0 0 15px var(--accent-glow);
            backdrop-filter: blur(5px);
            z-index: 1000;
            transition: all 0.3s ease;
            text-align: right;
        }

        .teacher-credit strong {
            color: var(--accent);
        }

        .teacher-credit:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--accent);
        }

        @media (max-width: 768px) {
            .teacher-credit {
                position: static;
                margin: 20px auto 0 auto;
                text-align: center;
                max-width: 90%;
            }
            body {
                flex-direction: column;
                padding: 20px 0;
                height: auto;
                min-height: 100vh;
            }
        }

        .container {
            width: 90%;
            max-width: 650px;
            perspective: 1000px;
        }

        .box {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 42, 95, 0.03);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, var(--primary), #ff6b8b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--primary-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .menu-grid { grid-template-columns: 1fr 1fr; }
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 15px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .menu-btn .icon {
            font-size: 1.8rem;
            transition: transform 0.3s;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, rgba(255, 42, 95, 0.1), rgba(255, 42, 95, 0.01));
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-4px);
        }

        .menu-btn:hover .icon {
            transform: scale(1.2);
        }

        .menu-btn.alt:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0, 240, 255, 0.01));
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s ease;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 30px;
            text-align: left;
        }

        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .answer-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        .result-score {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            margin: 20px 0;
        }

        .action-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px var(--primary-glow);
            transition: all 0.3s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--primary-glow);
        }
    </style>
</head>
<body>

<div class="teacher-credit">
    Вот что я смог сделать за все мое обучение у вас, <strong>Азамат байке</strong>! 🚀

    </div>

    let currentQuiz = [];
    let currentCategoryName = '';
    let currentQuestionIndex = 0;
    let score = 0;

    function renderMenu() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <h1>IT Quest Arena</h1>
            <div class="subtitle">Выбери свое испытание и докажи мастерство</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="initQuiz('IT')">
                    <span class="icon">💻</span>
                    <span>IT Квест</span>
                </button>
                <button class="menu-btn alt" onclick="initQuiz('IQ')">
                    <span class="icon">🧠</span>
                    <span>IQ Тест</span>
                </button>
                <button class="menu-btn" onclick="initQuiz('GAMES')">
                    <span class="icon">🎮</span>
                    <span>Гейминг</span>
                </button>
                <button class="menu-btn alt" onclick="initQuiz('CARS')">
                    <span class="icon">🚗</span>
                    <span>Автомобили</span>
                </button>
            </div>
        `;
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz(category) {
        currentQuiz = JSON.parse(JSON.stringify(database[category]));
        shuffle(currentQuiz);
        
        currentCategoryName = category === 'IT' ? 'IT Квест' : 
                              category === 'IQ' ? 'IQ Тест' : 
                              category === 'GAMES' ? 'Гейминг' : 'Автомобили';
        currentQuestionIndex = 0;
        score = 0;
        
        showQuestion();
    }

    function showQuestion() {
        const app = document.getElementById('app');
        const totalQuestions = currentQuiz.length;
        
        if (currentQuestionIndex >= totalQuestions) {
            showResult();
            return;
        }

        const qData = currentQuiz[currentQuestionIndex];
        const shuffledAnswers = shuffle([...qData.a]);
        const progressPercent = (currentQuestionIndex / totalQuestions) * 100;

        app.innerHTML = `
            <div class="quiz-header">
                <span>Испытание: <strong>${currentCategoryName}</strong></span>
                <span>Вопрос ${currentQuestionIndex + 1} из ${totalQuestions}</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: ${progressPercent}%"></div>
            </div>
            <div class="question-text">${qData.q}</div>
            <div class="answers-list">
                ${shuffledAnswers.map(answerText => `
                    <button class="answer-btn" onclick="handleAnswer('${answerText.replace(/'/g, "\\'")}')">
                        ${answerText}
                    </button>
                `).join('')}
            </div>
        `;
    }

    function handleAnswer(selectedAnswer) {
        const correctAnswer = currentQuiz[currentQuestionIndex].c;
        if (selectedAnswer === correctAnswer) {
            score++;
        }
        
        currentQuestionIndex++;
        showQuestion();
    }

    function showResult() {
        const app = document.getElementById('app');
        const total = currentQuiz.length;
        const percent = Math.round((score / total) * 100);
        
        let rank = "Новичок";
        if (percent >= 90) rank = "Легенда Арены 👑";
        else if (percent >= 70) rank = "Мастер ⚡";
        else if (percent >= 40) rank = "Опытный игрок ⚔️";

        app.innerHTML = `
            <h1>Результат</h1>
            <div class="subtitle">Испытание "${currentCategoryName}" завершено</div>
            <div class="result-score">${score} / ${total}</div>
            <p style="font-size: 1.2rem; margin-bottom: 10px;">Ваш ранг: <strong>${rank}</strong></p>
            <p style="color: var(--text-muted);">Правильных ответов: ${percent}%</p>
            <button class="action-btn" onclick="renderMenu()">Вернуться на главную</button>
        `;
    }

    renderMenu();
</script>
